name: CI/CD Pipeline

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize]

permissions:
  actions: read
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: client
        run: npm install

      - name: Run linter
        working-directory: client
        run: npm run lint

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: 3.13

      - name: Install uv
        working-directory: backend
        run: pip install uv

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync

      - name: Install ruff
        working-directory: backend
        run: uv run ruff check .

      - name: Install sqlfluff
        working-directory: backend
        run: uv run sqlfluff lint ../sql/init.sql

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install uv && uv sync

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript,python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: client
        run: npm install

      - name: Run client tests
        working-directory: client
        run: npm run test

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13

      - name: Install backend dependencies
        working-directory: backend
        run: pip install uv && uv sync

      - name: Run backend tests
        working-directory: backend
        run: uv run python -m pytest

  build:
    needs: [lint, security-scan, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with: { node-version: 22 }
      - run: npm install
        working-directory: client
      - run: npm run build
        working-directory: client
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: client/dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check secrets
        run: |
          echo "Host configured: ${{ secrets.DIGITALOCEAN_HOST != '' }}"
          echo "SSH key length: ${#SSH_KEY}"
        env:
          SSH_KEY: ${{ secrets.DIGITALOCEAN_SSH }}
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DIGITALOCEAN_HOST }}
          username: root
          key: ${{ secrets.DIGITALOCEAN_SSH }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd GuitarHero
            git pull
            docker compose up -d --build
