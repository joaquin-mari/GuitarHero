services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - monitoring-net
    ports:
    ports:
      - 127.0.0.1:9090:9090

  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    networks:
      - monitoring-net

networks:
  monitoring-net:
    external: true

volumes:
  grafana-data:
